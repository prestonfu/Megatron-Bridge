defaults:
  - execution: local
  - deployment: vllm
  - _self_

execution:
  output_dir: nemotron_3_nano_small_muon_results

deployment:
  checkpoint_path: /home/preston/scalable-homeworks/hw2/Megatron-Bridge/exports/nemotron_3_nano_small_muon_hf
  hf_model_handle: /checkpoint
  served_model_name: nemotron_3_nano_small_muon
  tensor_parallel_size: 2
  data_parallel_size: 1
  port: 8002
  extra_args: "--max-model-len 8192 --enforce-eager"
  env_vars:
    CUDA_VISIBLE_DEVICES: "lit:4,5"

evaluation:
  nemo_evaluator_config:
    config:
      params:
        max_retries: 5
        request_timeout: 360
        parallelism: 16
        limit_samples: 10  # uncomment for quick testing
        extra:
          tokenizer: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
          tokenizer_backend: huggingface
  tasks:
    - name: adlr_mmlu_pro_5_shot_base
    - name: adlr_mmlu
    - name: adlr_agieval_en_cot
    - name: adlr_humaneval_greedy
    - name: adlr_mbpp_sanitized_3_shot_greedy
    - name: adlr_gsm8k_cot_8_shot
    - name: adlr_minerva_math_nemo_4_shot
    - name: adlr_math_500_4_shot_sampled
    - name: adlr_arc_challenge_llama_25_shot
    - name: hellaswag
    - name: openbookqa
    - name: piqa
    - name: adlr_race
    - name: adlr_winogrande_5_shot
    - name: adlr_global_mmlu_lite_5_shot
    - name: adlr_mgsm_native_cot_8_shot

export:
  wandb:
    entity: prestonfu
    project: megatron_eval
    name: nemotron_3_nano_small_muon
