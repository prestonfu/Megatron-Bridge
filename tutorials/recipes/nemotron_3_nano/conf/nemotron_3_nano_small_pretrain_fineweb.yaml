# Small Nemotron-H model for pretraining on FineWeb-Edu
# 32 layers, ~57% hidden dim of the full 30B-A3B model
# WSD (Warmup-Stable-Decay) LR schedule scaled to 10k iters

# Data sources — supports glob patterns and per-source weights.
data_sources:
  - path: "/mnt/pretrain_data/fineweb_edu/processed_data_*_text_document"
    weight: 1.0

# Data configuration
dataset:
  sequence_length: 2048

# Training configuration
train:
  train_iters: 10000
  global_batch_size: 128
  micro_batch_size: 1
  eval_iters: 10

validation:
  eval_interval: 500

# Optimizer configuration (Distributed Muon)
optimizer:
  optimizer: dist_muon
  lr: 0.001
  weight_decay: 0.1
  use_distributed_optimizer: false
  muon_momentum: 0.95
  muon_use_nesterov: true
  muon_split_qkv: false
  muon_scale_mode: spectral
  muon_num_ns_steps: 5
  muon_tp_mode: blockwise

# DDP config — Muon requires distributed optimizer off
ddp:
  use_distributed_optimizer: false
  overlap_param_gather: false
  overlap_grad_reduce: true
  grad_reduce_in_fp32: true
  check_for_nan_in_grad: true
  data_parallel_sharding_strategy: no_shard

# Learning rate scheduler — cosine annealing
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 100
  lr_decay_iters: 10000
  min_lr: 0.0001             # min LR = 1e-4

# Checkpoint configuration
checkpoint:
  enabled: false
  save_on_last_step: true
  save: /mnt/checkpoints/megatron_bridge/nemotron_3_nano_small
  load: /mnt/checkpoints/megatron_bridge/nemotron_3_nano_small
  save_interval: 500

# Model configuration — small variant
# 32 layers, hidden_size=1536 (57% of 2688)
model:
  seq_length: 2048

  # Parallelism (TP=2, EP=2 -> DP=2 on 8 GPUs)
  sequence_parallel: true
  tensor_model_parallel_size: 2
  pipeline_model_parallel_size: 1
  context_parallel_size: 1
  expert_model_parallel_size: 2

  # Architecture overrides for small model
  num_layers: 32
  hidden_size: 1536
  num_attention_heads: 16
  ffn_hidden_size: 1088
  mamba_num_heads: 40
  mamba_head_dim: 64
  kv_channels: 128
  hybrid_override_pattern: "MEMEM*EMEMEM*EMEMEM*EMEMEM*EMEME"

  # MoE configuration (keep expert count, scale FFN)
  num_moe_experts: 128
  moe_ffn_hidden_size: 1088
  moe_shared_expert_intermediate_size: 2176
  moe_router_topk: 6
  moe_router_topk_scaling_factor: 2.5

  # MoE load balancing
  moe_router_enable_expert_bias: true
  moe_router_bias_update_rate: 0.001
  moe_router_load_balancing_type: seq_aux_loss
  moe_aux_loss_coeff: 0.0001

# Logging
logger:
  log_interval: 10
  tensorboard_dir: ./logs/nemotron_3_nano_small
  wandb_project: megatron_bridge_pretrain
  wandb_exp_name: nemotron_3_nano_small_fineweb_edu
  wandb_entity: prestonfu

# Random seed
rng:
  seed: 1234
