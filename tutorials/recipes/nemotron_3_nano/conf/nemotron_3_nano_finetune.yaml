# Example YAML configuration for Nemotron 3 Nano (30B-A3B MoE) finetuning with LoRA
# This file demonstrates commonly customized settings.
# Modify values as needed for your use case.

# Data configuration
dataset:
  # Replace with your dataset path (JSONL format recommended)
  # data_path: /path/to/your/finetuning_dataset.jsonl
  seq_length: 2048

# Training configuration
train:
  train_iters: 100
  global_batch_size: 128
  micro_batch_size: 2
  eval_iters: 10
  eval_interval: 500

# Optimizer configuration
optimizer:
  lr: 0.0001
  min_lr: 0.00001
  weight_decay: 0.1

# Learning rate scheduler
scheduler:
  lr_warmup_iters: 10
  lr_decay_style: cosine

# Checkpoint configuration
checkpoint:
  # Directory to save finetuned checkpoints
  save: ./checkpoints/nemotron_3_nano_finetuned
  # Directory to resume from during training
  load: ./checkpoints/nemotron_3_nano_finetuned
  # Directory for pretrained weights in Megatron format
  pretrained_checkpoint: ./checkpoints/nemotron_3_nano

  save_interval: 200

# LoRA configuration
peft:
  dim: 32  # LoRA rank
  alpha: 32  # LoRA alpha scaling

# Model configuration
# Note: seq_length must match dataset.seq_length
model:
  seq_length: 2048
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1
  context_parallel_size: 1

# Logging
logger:
  log_interval: 10
  tensorboard_dir: ./logs/nemotron_3_nano_finetuned
  # wandb_project: my_finetune_project
  # wandb_entity: my_team
  # mlflow_experiment: nemotron_3_nano_finetuned  # Uncomment to enable MLFlow logging
  # mlflow_run_name: nemotron_3_nano_finetuned
  # mlflow_tracking_uri: http://localhost:5000  # Optional: use remote MLflow server
  # mlflow_tags:
  #   project: nemotron_3_nano
  #   phase: finetune
  #   variant: mlflow_example

# Random seed
rng:
  seed: 1234
